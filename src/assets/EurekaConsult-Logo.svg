<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="1024" height="1024">
  <defs>
    <linearGradient id="gEC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#gEC)"/>
  <!-- Outer triangle edges -->
  <line x1="128" y1="66" x2="76"  y2="178" stroke="white" stroke-width="4.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <line x1="128" y1="66" x2="180" y2="178" stroke="white" stroke-width="4.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <line x1="76"  y1="178" x2="180" y2="178" stroke="white" stroke-width="4.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <!-- Centre to outer spokes -->
  <line x1="128" y1="128" x2="128" y2="66"  stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="76"  y2="178" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="180" y2="178" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="128" cy="66"  r="14" fill="white"/>
  <circle cx="76"  cy="178" r="14" fill="white"/>
  <circle cx="180" cy="178" r="14" fill="white"/>
  <!-- Centre node (larger) -->
  <circle cx="128" cy="128" r="18" fill="white"/>
  <!-- Subtle corner accents -->
  <circle cx="42"  cy="42"  r="4" fill="white" fill-opacity="0.22"/>
  <circle cx="214" cy="42"  r="4" fill="white" fill-opacity="0.18"/>
  <circle cx="42"  cy="214" r="4" fill="white" fill-opacity="0.18"/>
  <circle cx="214" cy="214" r="4" fill="white" fill-opacity="0.22"/>
</svg>